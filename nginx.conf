server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml application/xml;

    # fonts, favicon, OG image: content-addressed by nothing, but effectively
    # immutable in practice — cache hard, a stale copy for a returning visitor
    # is a non-issue.
    location ~* \.(?:woff2|svg|png)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # css/js: no filename hash, so a long cache would hide deploys from
    # returning visitors — cache for a day and let it re-validate after that.
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    # html and crawler/agent discovery files change with every release — never
    # serve a stale copy.
    location ~* \.(?:html|txt|xml)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
